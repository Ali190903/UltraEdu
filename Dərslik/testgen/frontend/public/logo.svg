  <path d="M18 5 L18 9 L22 9" fill="none" stroke="#dcfce7" stroke-width="0.8"/>
  <!-- Test question lines -->
  <rect x="9.5" y="12" width="8" height="1.5" rx="0.75" fill="#bbf7d0"/>
  <rect x="9.5" y="15" width="8" height="1.5" rx="0.75" fill="#bbf7d0"/>
  <rect x="9.5" y="18" width="5.5" height="1.5" rx="0.75" fill="#bbf7d0"/>
  <!-- Check badge -->
  <circle cx="22" cy="24" r="5.5" fill="#0f172a"/>
  <circle cx="22" cy="24" r="4.5" fill="#16a34a"/>
  <polyline points="20,24 21.5,25.5 24,22.5"
    fill="none" stroke="white" stroke-width="1.6"
    stroke-linecap="round" stroke-linejoin="round"/>
